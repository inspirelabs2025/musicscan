name: Capgo OTA deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - run: npm install --no-save @capgo/cli typescript
      - run: npx capgo bundle upload com.musicscan.app --path dist --channel production --apikey ${{ secrets.CAPGO_TOKEN }}
