    <!-- Critical CSS - everything above the fold renders without JS or external CSS -->
    <style>
      /* Font display swap for ALL font loading */
      @font-face { font-family: 'system-ui'; font-display: swap; src: local('system-ui'); }
      
      /* Base reset & dark background */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { -webkit-text-size-adjust: 100%; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
      body { background: #0f0d1a; color: #fafafa; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.5; }
      #root { min-height: 100vh; background: #0f0d1a; }
      
      /* Sticky header - renders immediately */
      header, .sticky-header, [class*="StickyHeader"] { position: fixed; top: 0; left: 0; right: 0; z-index: 50; height: 3.5rem; background: rgba(15,13,26,0.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; }
      
      /* Hero section - immediate paint, no JS needed for layout */
      .scanner-hero, section[class*="hero"], [class*="ScannerHero"] {
        position: relative; min-height: 500px; background: #000; overflow: hidden;
        display: flex; align-items: center; justify-content: center; text-align: center;
        padding: 5rem 1rem 2rem; margin-top: -3.5rem; padding-top: calc(3.5rem + 4rem);
      }
      .scanner-hero::before {
        content: ''; position: absolute; inset: 0;
        background: linear-gradient(135deg, rgba(139,92,246,0.5), rgba(0,0,0,1), rgba(234,179,8,0.3));
      }
      
      /* Hero H1 - LCP element, renders instantly */
      .scanner-hero h1, section[class*="hero"] h1 {
        font-size: 2.25rem; font-weight: 900; color: #fff; line-height: 1.1;
        letter-spacing: -0.025em; margin-bottom: 1.5rem; position: relative; z-index: 1;
      }
      .scanner-hero h2, section[class*="hero"] h2 {
        font-size: 1.125rem; color: rgba(255,255,255,0.8); margin-bottom: 2.5rem;
        position: relative; z-index: 1;
      }
      @media(min-width:768px) {
        .scanner-hero, section[class*="hero"] { min-height: 600px; }
        .scanner-hero h1, section[class*="hero"] h1 { font-size: 3.75rem; }
        .scanner-hero h2, section[class*="hero"] h2 { font-size: 1.25rem; }
      }
      @media(min-width:1024px) {
        .scanner-hero h1, section[class*="hero"] h1 { font-size: 4.5rem; }
        .scanner-hero h2, section[class*="hero"] h2 { font-size: 1.5rem; }
      }
      
      /* CTA button skeleton */
      .hero-cta, [class*="hero"] a[href*="scan"], .scanner-hero button, .scanner-hero a {
        display: inline-flex; align-items: center; gap: 0.5rem;
        padding: 1rem 2rem; border-radius: 1rem; font-weight: 700; font-size: 1.25rem;
        background: linear-gradient(to right, hsl(45,100%,51%), hsl(48,96%,53%), hsl(45,100%,51%));
        color: #000; border: none; cursor: pointer; text-decoration: none;
        box-shadow: 0 25px 50px -12px rgba(234,179,8,0.4); position: relative; z-index: 1;
      }
      
      /* Steps strip */
      .steps-strip, [class*="steps"] { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; padding: 1rem; }

      /* CLS fix: reserve space for async sections */
      .section-artists { min-height: 400px; }
      .section-genres { min-height: 300px; }
      @media(min-width:768px) { .section-artists { min-height: 350px; } .section-genres { min-height: 250px; } }
      
      /* Singles section critical styles */
      .singles-scroll { display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 1rem; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
      .singles-scroll > * { flex-shrink: 0; width: 10rem; scroll-snap-align: start; }
      @media(min-width:768px) { .singles-scroll > * { width: 12rem; } }
      .single-art { aspect-ratio: 1/1; border-radius: 0.75rem; overflow: hidden; background: #1a1625; margin-bottom: 0.5rem; }
      .single-art img { width: 100%; height: 100%; object-fit: cover; }
      
      /* Skeleton pulse animation - CSS only, no JS */
      @keyframes skeleton-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
      .skeleton { background: #1a1625; border-radius: 0.5rem; animation: skeleton-pulse 2s ease-in-out infinite; }
      
      /* Grid layout for content sections */
      .content-grid { display: grid; gap: 1rem; }
      @media(min-width:640px) { .content-grid { grid-template-columns: repeat(2, 1fr); } }
      @media(min-width:1024px) { .content-grid { grid-template-columns: repeat(3, 1fr); } }
      
      /* Image aspect ratio containers */
      .aspect-square { aspect-ratio: 1/1; }
      .aspect-video { aspect-ratio: 16/9; }
      img { max-width: 100%; height: auto; }
      
      /* pt-14 for main content below fixed header */
      main { padding-top: 3.5rem; }
