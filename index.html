<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="build-version" content="2024-07-27T12:00:00.000Z">
    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#5bbad5">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="theme-color" content="#ffffff">
    <!-- Title -->
    <title>MusicScan</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <style id="vite-plugin-css-modules-styles"></style>

    <!-- Environment detection and CSS variables setup -->
    <script>
      (function() {
        const isMobileApp = window.location.protocol === 'capacitor:';
        document.documentElement.setAttribute('data-mobile-app', isMobileApp ? 'true' : 'false');

        // Get color scheme from media query
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');

        function setColorScheme(scheme) {
          document.documentElement.classList.toggle('dark', scheme === 'dark');
          document.documentElement.classList.toggle('light', scheme === 'light');
          localStorage.setItem('theme', scheme);
        }

        // Check localStorage for preferred scheme, then system preference
        const storedTheme = localStorage.getItem('theme');
        if (storedTheme) {
          setColorScheme(storedTheme);
        } else {
          setColorScheme(prefersDark.matches ? 'dark' : 'light');
        }

        // Listen for changes in system preference
        prefersDark.addEventListener('change', (e) => {
          if (!localStorage.getItem('theme')) { // Only react if no explicit theme is set
            setColorScheme(e.matches ? 'dark' : 'light');
          }
        });

        // Set CSS variables for AI nudge
        document.documentElement.style.setProperty('--ai-nudge-background', '256 94% 6%'); // Dark purple
        document.documentElement.style.setProperty('--ai-nudge-foreground', '270 100% 98%'); // Greyish-white
        document.documentElement.style.setProperty('--ai-nudge-border', '256 60% 30%'); // Border color

        // Set CSS variables for vinyl themed colors
        document.documentElement.style.setProperty('--vinyl-gold', '50 100% 50%');
        document.documentElement.style.setProperty('--vinyl-silver', '200 5% 70%');
        document.documentElement.style.setProperty('--vinyl-black', '0 0% 10%');
        document.documentElement.style.setProperty('--vinyl-purple', '270 60% 40%');

        document.documentElement.style.setProperty('--gradient-vinyl', 'linear-gradient(to bottom right, hsl(var(--vinyl-purple)), hsl(var(--vinyl-black)))');
        document.documentElement.style.setProperty('--gradient-scan', 'linear-gradient(90deg, transparent, rgba(var(--primary), 0.2), transparent)');

        // Set CSS variables for Echo themed colors
        document.documentElement.style.setProperty('--echo-violet', '270 80% 60%');
        document.documentElement.style.setProperty('--echo-lavender', '240 60% 80%');
        document.documentElement.style.setProperty('--echo-gold', '40 100% 70%');
        document.documentElement.style.setProperty('--echo-cream', '30 30% 95%');

        // Set CSS variables for Christmas themed colors
        document.documentElement.style.setProperty('--christmas-red', '0 80% 50%');
        document.documentElement.style.setProperty('--christmas-green', '120 70% 30%');
        document.documentElement.style.setProperty('--christmas-gold', '50 100% 50%');
        document.documentElement.style.setProperty('--christmas-cream', '30 30% 95%');
        document.documentElement.style.setProperty('--christmas-burgundy', '340 70% 30%');
        document.documentElement.style.setProperty('--christmas-pine', '140 60% 20%');

        // Base CSS variables - these are generally not changed by themes
        document.documentElement.style.setProperty('--font-sans', 'system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif');
        document.documentElement.style.setProperty('--font-mono', '"Fira Code", monospace');
      })();
    </script>
  </body>
</html>
